dataset_root: dataset
frames_to_stack: 16
downsampling_size: 256
crop_size: 224
finger_names:
  - thumb
  - index
  - middle
  - ring
label_method: manual
n_aug_copies: 2
include_original: true
color_jitter_brightness: 0.2
remove_background: false
train_ratio: 0.7
val_ratio: 0.3
split_seed: 42
batch_size: 32
num_workers: 8
audio_sequence_length: 224
audio_frequency_bins: 256
cache_enabled: true
cache_dir: .cache/grasp_iterations
