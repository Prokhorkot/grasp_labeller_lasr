checkpoint:
  monitor: val_loss
  mode: min
  save_top_k: 1
  filename: "best-{epoch:02d}-{val_loss:.4f}"
early_stopping:
  monitor: val_loss
  mode: min
  patience: 10
learning_rate_monitor:
  enabled: true
  callback:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: epoch
    log_momentum: false
