checkpoint:
  monitor: val/loss
  mode: min
  save_top_k: 1
  filename: "best-{epoch:02d}"
early_stopping:
  monitor: val/loss
  mode: min
  patience: 10
learning_rate_monitor:
  enabled: true
  callback:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: epoch
    log_momentum: false
